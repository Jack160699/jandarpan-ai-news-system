name: Enterprise Workers

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes — primary live ingestion trigger (Vercel/cron-job.org backup)
    - cron: "*/30 * * * *"

jobs:
  newsroom-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Ingest wire + RSS
        env:
          APP_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Set GitHub secrets: PRODUCTION_URL, CRON_SECRET"
            exit 1
          fi
          curl -fsS -X POST "$APP_URL/api/fetch-news" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"

      - name: Drain worker job queue
        env:
          APP_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$APP_URL/api/cron/jobs" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Generate editorials from events
        env:
          APP_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$APP_URL/api/cron/worker/editorial_generate" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 120

      - name: Run full orchestration
        env:
          APP_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$APP_URL/api/cron/orchestrate" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Worker health check
        env:
          APP_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS "$APP_URL/api/cron/workers/health" \
            -H "Authorization: Bearer $CRON_SECRET"
