name: Enterprise Workers

on:
  workflow_dispatch:
  schedule:
    # 48×/day at :07 and :37 UTC — avoids GitHub Actions congestion at :00/:30 where
    # scheduled jobs are often delayed or dropped (see GitHub schedule event docs).
    - cron: "7 * * * *"
    - cron: "37 * * * *"

jobs:
  newsroom-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      APP_URL: ${{ secrets.PRODUCTION_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and normalize production URL
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Set GitHub secrets: PRODUCTION_URL, CRON_SECRET"
            exit 1
          fi

          # Apex jandarpan.news returns HTTP 307 → www; use canonical host directly.
          case "$APP_URL" in
            https://jandarpan.news|http://jandarpan.news|https://jandarpan.news/|http://jandarpan.news/)
              echo "::warning::PRODUCTION_URL uses apex domain. Normalizing to https://www.jandarpan.news — update the secret to skip redirects."
              echo "APP_URL=https://www.jandarpan.news" >> "$GITHUB_ENV"
              ;;
          esac

          echo "Using APP_URL=${APP_URL}"

      - name: Ingest wire + RSS
        run: |
          bash .github/scripts/invoke-cron-endpoint.sh \
            "fetch-news" \
            "/api/fetch-news" \
            "POST" \
            "" \
            "300"

      - name: Drain worker job queue
        run: |
          bash .github/scripts/invoke-cron-endpoint.sh \
            "cron-jobs" \
            "/api/cron/jobs" \
            "POST"

      - name: Generate editorials from events
        run: |
          bash .github/scripts/invoke-cron-endpoint.sh \
            "editorial_generate" \
            "/api/cron/worker/editorial_generate" \
            "POST" \
            "" \
            "120"

      - name: Run full orchestration
        run: |
          bash .github/scripts/invoke-cron-endpoint.sh \
            "orchestrate" \
            "/api/cron/orchestrate" \
            "POST" \
            "{}"

      - name: Worker health check
        run: |
          bash .github/scripts/invoke-cron-endpoint.sh \
            "workers-health" \
            "/api/cron/workers/health" \
            "GET"
