name: Enterprise Workers

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Call worker health endpoint
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/workers/health"
