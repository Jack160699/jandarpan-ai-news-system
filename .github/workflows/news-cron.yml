name: News ingestion cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: news-ingestion
  cancel-in-progress: false

jobs:
  fetch-news:
    name: Hybrid news ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Preflight health check
        env:
          HEALTH_URL: https://newspaper-motion.vercel.app/api/health

        run: |
          set -euo pipefail

          echo "Health check: ${HEALTH_URL}"

          http_code=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
            -H "Accept: application/json" \
            --max-time 30 \
            "${HEALTH_URL}")

          echo "Health HTTP: ${http_code}"

          cat /tmp/health.json || true

          echo ""

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::warning::Health check returned ${http_code} — continuing ingestion"
          fi

      - name: Trigger hybrid ingestion API
        id: ingest

        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: https://newspaper-motion.vercel.app/api/fetch-news

        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET is not set in GitHub repository secrets."
            exit 1
          fi

          echo "Calling ${API_URL} ..."

          http_code=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            --max-time 120 \
            "${API_URL}")

          echo "HTTP status: ${http_code}"

          echo "Response body:"

          cat /tmp/response.json || true

          echo ""

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Ingestion API failed with HTTP ${http_code}"
            exit 1
          fi

          echo "Ingestion completed successfully."          http_code=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
            -H "Accept: application/json" \
            --max-time 30 \
            "${HEALTH_URL}")
          echo "Health HTTP: ${http_code}"
          cat /tmp/health.json || true
          echo ""
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::warning::Health check returned ${http_code} — continuing ingestion"
          fi

      - name: Trigger hybrid ingestion API
        id: ingest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
         API_URL: https://newspaper-motion.vercel.app/api/fetch-news
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET is not set in GitHub repository secrets."
            exit 1
          fi

          echo "Calling ${API_URL} …"
          http_code=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            --max-time 180 \
            "${API_URL}")

          echo "HTTP status: ${http_code}"
          echo "── Response preview ──"
          head -c 4000 /tmp/response.json || true
          echo ""
          echo "── End preview ──"

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Ingestion API failed with HTTP ${http_code}"
            exit 1
          fi

          if ! grep -q '"ok"[[:space:]]*:[[:space:]]*true' /tmp/response.json; then
            echo "::error::API returned non-success payload (ok !== true)"
            exit 1
          fi

          if command -v jq >/dev/null 2>&1; then
            echo "── Category stats ──"
            jq -r '.categoryStats // {} | to_entries[] | "\(.key): \(.value)"' /tmp/response.json 2>/dev/null || true
            echo "── Provider stats ──"
            jq -r '.providerStats // {} | to_entries[] | "\(.key): \(.value)"' /tmp/response.json 2>/dev/null || true
            inserted=$(jq -r '.inserted // 0' /tmp/response.json 2>/dev/null || echo "0")
            total=$(jq -r '.totalFetched // 0' /tmp/response.json 2>/dev/null || echo "0")
            echo "Inserted: ${inserted} / fetched: ${total}"
          fi

          echo "Ingestion completed successfully."
