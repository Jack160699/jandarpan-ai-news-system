# Live news ingestion — runs every 30 minutes (Hobby-safe; Vercel cron is daily backup only)
name: News Ingest

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: news-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL secret is missing (e.g. https://your-app.vercel.app)"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET secret is missing"
            exit 1
          fi

      - name: Trigger ingest
        id: ingest
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          ENDPOINT="${APP_URL%/}/api/fetch-news"
          echo "[INGEST_START] POST ${ENDPOINT}"

          http_code=$(curl -sS -o /tmp/ingest.json -w "%{http_code}" \
            -X POST "${ENDPOINT}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            --max-time 120)

          echo "HTTP ${http_code}"
          cat /tmp/ingest.json || true
          echo ""

          ok=$(node -e "try{const j=JSON.parse(require('fs').readFileSync('/tmp/ingest.json','utf8'));process.stdout.write(j.ok?'true':'false')}catch{process.stdout.write('false')}")

          if [ "${http_code}" = "401" ]; then
            echo "::error::[INGEST_FAILURE] Unauthorized — check CRON_SECRET matches Vercel"
            exit 1
          fi

          if [ "${http_code}" = "500" ]; then
            echo "::error::[INGEST_FAILURE] Server error — check Vercel env (Supabase, API keys)"
            exit 1
          fi

          if [ "${ok}" = "true" ]; then
            echo "[INGEST_SUCCESS] Ingest completed (HTTP ${http_code})"
            exit 0
          fi

          if [ "${http_code}" = "502" ]; then
            preserved=$(node -e "try{const j=JSON.parse(require('fs').readFileSync('/tmp/ingest.json','utf8'));process.stdout.write(j.preservedExistingDb?'yes':'no')}catch{process.stdout.write('no')}")
            echo "::warning::[INGEST_FAILURE] All providers failed (HTTP 502). Existing DB preserved: ${preserved}"
            exit 0
          fi

          echo "::warning::[INGEST_FAILURE] Unexpected response HTTP ${http_code}"
          exit 0

      - name: Optional health check
        if: success()
        continue-on-error: true
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          curl -sS "${APP_URL%/}/api/health" -H "Accept: application/json" --max-time 30 | head -c 2000
          echo ""
